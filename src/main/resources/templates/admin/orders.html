<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::main}, 'Quản lý đơn hàng', 'admin')}">
<body><main>
<div class="admin-layout">
    <aside class="admin-sidebar">
        <div style="color:var(--yellow);font-weight:800;font-size:0.75rem;text-transform:uppercase;letter-spacing:0.1em;padding:0.5rem 1rem;margin-bottom:0.5rem;">Menu</div>
        <a th:href="@{/admin}">          &#128202; Bảng điều khiển</a>
        <a th:href="@{/admin/products}"> &#9749; Sản phẩm</a>
        <a th:href="@{/admin/orders}"   class="active">&#128230; Đơn hàng</a>
        <a th:href="@{/}">             &#8592; Cửa hàng</a>
    </aside>
    <div class="admin-content">
        <h1 style="margin-bottom:1.5rem;">Đơn Hàng</h1>
        <div th:if="${successMsg}" class="flash flash--success" th:text="${successMsg}"></div>

        <div th:if="${orders.isEmpty()}" class="empty-state">
            <div class="empty-state__icon">&#128230;</div>
            <h2>Chưa có đơn hàng</h2>
            <p>Đơn hàng của khách sẽ xuất hiện ở đây.</p>
        </div>

        <div th:unless="${orders.isEmpty()}" class="table-wrap">
            <table>
                <thead><tr><th>#</th><th>Khách hàng</th><th>Liên hệ</th><th>Sản phẩm</th><th>Tổng tiền</th><th>Trạng thái</th><th>Ngày đặt</th><th>Cập nhật</th></tr></thead>
                <tbody>
                    <tr th:each="order : ${orders}">
                        <td style="font-weight:800;" th:text="'#' + ${order.id}">1</td>
                        <td style="font-weight:700;"
                            th:text="${order.user != null ? order.user.fullName : order.guestName + ' (Khách)'}">Tên</td>
                        <td style="font-size:0.85rem;">
                            <div th:text="${order.user != null ? order.user.email : order.guestEmail}">email</div>
                            <div style="color:#888;" th:text="${order.guestPhone}">sdt</div>
                        </td>
                        <td>
                            <div th:each="item : ${order.items}" style="font-size:0.82rem;font-weight:600;white-space:nowrap;">
                                <span th:text="${item.product.name}">Sản phẩm</span>
                                <span style="color:#888;" th:text="' x' + ${item.quantity}">x1</span>
                            </div>
                        </td>
                        <td style="font-weight:800;"
                            th:text="${#numbers.formatDecimal(order.totalAmount,1,'POINT',0,'COMMA')} + '₫'">0₫</td>
                        <td>
                            <span class="badge"
                                  th:classappend="${order.status.name() == 'PENDING'   ? ' badge--yellow' :
                                                   order.status.name() == 'CONFIRMED' ? ' badge--blue'   :
                                                   order.status.name() == 'DELIVERED' ? ' badge--green'  : ' badge--red'}"
                                  th:text="${order.status}">STATUS</span>
                        </td>
                        <td style="font-size:0.85rem;white-space:nowrap;"
                            th:text="${#temporals.format(order.createdAt,'dd/MM/yyyy')}">Ngày</td>
                        <td>
                            <form th:action="@{/admin/orders/{id}/status(id=${order.id})}" method="post"
                                  style="display:flex;gap:0.3rem;align-items:center;">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                <select name="status" style="border:2px solid var(--black);padding:0.3rem 0.5rem;
                                        font-family:var(--font);font-weight:700;font-size:0.8rem;background:var(--white);cursor:pointer;">
                                    <option th:each="s : ${statuses}" th:value="${s}" th:text="${s}"
                                            th:selected="${s == order.status}">STATUS</option>
                                </select>
                                <button type="submit" class="btn btn--primary" style="padding:0.3rem 0.6rem;font-size:0.78rem;">Lưu</button>
                            </form>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</main></body>
</html>
