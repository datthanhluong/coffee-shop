<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::main}, 'Đăng ký', '')}">
<body><main>

    <div class="form-wrap" style="padding-top:4rem;padding-bottom:4rem;">
        <div style="text-align:center;margin-bottom:2rem;">
            <img th:src="@{/images/logo-transparent.png}" alt="LENGKENG" style="height:80px;margin:0 auto 0.5rem;display:block;"/>
            <div style="font-size:1.8rem;font-weight:800;letter-spacing:-0.03em;">
                LENG<span style="color:var(--red);">KENG</span>
            </div>
        </div>

        <div class="form-card">
            <h1 class="form-title">Tạo tài khoản</h1>
            <p class="form-subtitle">Tham gia BrewBrute và đặt ly cà phê đầu tiên ngay hôm nay.</p>

            <div th:if="${errorMsg}" class="flash flash--error" style="margin:0 0 1.2rem;" th:text="${errorMsg}"></div>

            <form th:action="@{/register}" method="post" th:object="${registerForm}" novalidate>
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                <div class="form-group">
                    <label for="fullName">Họ và tên</label>
                    <input type="text" id="fullName" th:field="*{fullName}" placeholder="Nguyễn Văn A" autocomplete="name"/>
                    <div class="form-error" th:if="${#fields.hasErrors('fullName')}" th:errors="*{fullName}"></div>
                </div>
                <div class="form-group">
                    <label for="email">Địa chỉ Email</label>
                    <input type="email" id="email" th:field="*{email}" placeholder="ban@email.com" autocomplete="email"/>
                    <div class="form-error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
                </div>
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;">
                    <div class="form-group">
                        <label for="password">Mật khẩu</label>
                        <input type="password" id="password" th:field="*{password}" placeholder="Tối thiểu 6 ký tự" autocomplete="new-password"/>
                        <div class="form-error" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
                    </div>
                    <div class="form-group">
                        <label for="confirmPassword">Xác nhận mật khẩu</label>
                        <input type="password" id="confirmPassword" th:field="*{confirmPassword}" placeholder="Nhập lại mật khẩu" autocomplete="new-password"/>
                        <div class="form-error" th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}"></div>
                    </div>
                </div>

                <div style="background:var(--cream);border:2px solid var(--black);padding:0.8rem 1rem;
                            font-size:0.82rem;font-weight:600;color:#555;margin-bottom:1.2rem;">
                    Bằng cách tạo tài khoản, bạn đồng ý với <strong>Điều khoản dịch vụ</strong> của chúng tôi.
                </div>

                <button type="submit" class="btn btn--primary btn--lg w-full" style="justify-content:center;">
                    Tạo tài khoản &rarr;
                </button>
            </form>

            <div style="text-align:center;margin-top:1.5rem;padding-top:1.5rem;
                        border-top:2px solid var(--black);font-weight:600;font-size:0.9rem;">
                Đã có tài khoản?
                <a th:href="@{/login}" style="color:var(--red);font-weight:800;text-decoration:underline;">Đăng nhập</a>
            </div>
        </div>
    </div>

</main></body>
</html>
