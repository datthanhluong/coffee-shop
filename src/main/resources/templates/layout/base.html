<!DOCTYPE html>
<html lang="vi"
      th:fragment="layout(content, pageTitle, activePage)"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${pageTitle} + ' — LENGKENG'">LENGKENG</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin=""/>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>

<!-- ── Navbar ─────────────────────────────────────────── -->
<nav class="navbar">
    <a th:href="@{/}" class="navbar__logo">
        <img th:src="@{/images/logo-transparent.png}" alt="LENGKENG Logo" class="navbar__logo-img"/>
        <span class="navbar__logo-text">LENG<span>KENG</span></span>
    </a>

    <ul class="navbar__links">
        <li><a th:href="@{/}"         th:classappend="${activePage == 'home'}     ? ' active'">Trang chủ</a></li>
        <li><a th:href="@{/products}" th:classappend="${activePage == 'products'} ? ' active'">Thực đơn</a></li>
        <li sec:authorize="hasRole('ADMIN')">
            <a th:href="@{/admin}"    th:classappend="${activePage == 'admin'}    ? ' active'">Quản trị</a>
        </li>
    </ul>

    <div class="navbar__actions">
        <a th:href="@{/cart}" class="btn btn--icon" aria-label="Giỏ hàng">
            <span class="cart-icon">&#9749;</span>
            <span class="cart-badge"
                  th:if="${session.cart != null and !#lists.isEmpty(session.cart)}"
                  th:text="${#lists.size(session.cart)}">0</span>
        </a>

        <div sec:authorize="isAnonymous()" style="display:flex;gap:0.5rem;">
            <a th:href="@{/login}"    class="btn btn--outline">Đăng nhập</a>
            <a th:href="@{/register}" class="btn btn--primary">Đăng ký</a>
        </div>

        <div sec:authorize="isAuthenticated()" style="display:flex;gap:0.5rem;align-items:center;">
            <span class="user-tag" sec:authentication="name">User</span>
            <form th:action="@{/logout}" method="post" style="margin:0;">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit" class="btn btn--outline">Đăng xuất</button>
            </form>
        </div>
    </div>

    <button class="navbar__hamburger" id="hamburger" aria-label="Menu">&#9776;</button>
</nav>

<!-- Mobile menu -->
<div class="mobile-menu" id="mobileMenu">
    <a th:href="@{/}">Trang chủ</a>
    <a th:href="@{/products}">Thực đơn</a>
    <a th:href="@{/cart}">Giỏ hàng</a>
    <a sec:authorize="isAnonymous()"    th:href="@{/login}">Đăng nhập</a>
    <a sec:authorize="isAnonymous()"    th:href="@{/register}">Đăng ký</a>
    <a sec:authorize="hasRole('ADMIN')" th:href="@{/admin}">Quản trị</a>
</div>

<!-- ── Flash Messages ─────────────────────────────────── -->
<div th:if="${successMsg}" class="flash flash--success" th:text="${successMsg}"></div>
<div th:if="${errorMsg}"   class="flash flash--error"   th:text="${errorMsg}"></div>

<!-- ── Page Content ───────────────────────────────────── -->
<main th:replace="${content}">Nội dung trang.</main>

<!-- ── Footer ────────────────────────────────────────── -->
<footer class="footer">
    <div class="footer__inner">
        <div class="footer__brand">
            <div class="footer__logo-wrap">
                <img th:src="@{/images/logo-transparent.png}" alt="LENGKENG" class="footer__logo-img"/>
                <span class="footer__logo-text">LENG<span>KENG</span></span>
            </div>
            <p>Cà phê đậm đà. Không nhân nhượng.</p>
        </div>
        <div class="footer__links">
            <a th:href="@{/}">Trang chủ</a>
            <a th:href="@{/products}">Thực đơn</a>
            <a th:href="@{/cart}">Giỏ hàng</a>
        </div>
        <div class="footer__copy">&copy; 2024 LENGKENG Coffee. Bảo lưu mọi quyền.</div>
    </div>
</footer>

<script th:src="@{/js/main.js}"></script>
</body>
</html>
