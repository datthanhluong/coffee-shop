<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::main}, ${product.name}, 'products')}">
<body><main>

    <div style="padding:1rem 2rem;border-bottom:2px solid var(--black);
                background:var(--white);font-size:0.85rem;font-weight:600;">
        <a th:href="@{/}">Trang chủ</a>
        <span style="margin:0 0.5rem;">/</span>
        <a th:href="@{/products}">Thực đơn</a>
        <span style="margin:0 0.5rem;">/</span>
        <span th:text="${product.name}">Sản phẩm</span>
    </div>

    <div class="product-detail">
        <div>
            <div class="product-detail__img-wrap">
                <img th:if="${product.imageUrl != null}"
                     th:src="@{${product.imageUrl}}" th:alt="${product.name}"/>
                <img th:unless="${product.imageUrl != null}"
                     th:src="@{/images/logo-transparent.png}"
                     th:alt="${product.name}"
                     style="width:100%;height:100%;object-fit:contain;padding:1rem;"/>
            </div>
        </div>

        <div class="product-detail__info">
            <div>
                <span class="badge badge--black" th:text="${product.category}">Espresso</span>
                <span th:if="${product.featured}" class="badge badge--yellow" style="margin-left:0.5rem;">&#11088; Nổi bật</span>
            </div>

            <h1 th:text="${product.name}">Tên cà phê</h1>

            <div class="product-detail__price"
                 th:text="${#numbers.formatDecimal(product.price, 1, 'POINT', 0, 'COMMA')} + '₫'">35.000₫</div>

            <p style="color:#444;font-size:1rem;line-height:1.7;" th:text="${product.description}">Mô tả</p>

            <div th:unless="${product.available}" class="flash flash--error" style="margin:0;">
                Sản phẩm này hiện không có sẵn.
            </div>

            <form th:if="${product.available}" th:action="@{/cart/add}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <input type="hidden" name="productId" th:value="${product.id}"/>
                <div style="margin-bottom:1.2rem;">
                    <label style="display:block;font-weight:700;font-size:0.8rem;
                                  text-transform:uppercase;letter-spacing:0.05em;margin-bottom:0.5rem;">Số lượng</label>
                    <div class="qty-control">
                        <button type="button" data-action="dec">&#8722;</button>
                        <input type="number" name="quantity" value="1" min="1" max="20"/>
                        <button type="button" data-action="inc">&#43;</button>
                    </div>
                </div>
                <div style="display:flex;gap:1rem;flex-wrap:wrap;">
                    <button type="submit" class="btn btn--primary btn--lg">&#9749; Thêm vào giỏ</button>
                    <a th:href="@{/products}" class="btn btn--outline btn--lg">&larr; Quay lại thực đơn</a>
                </div>
            </form>

            <div style="padding-top:1.5rem;border-top:2px solid var(--black);display:flex;gap:1.5rem;flex-wrap:wrap;">
                <div>
                    <div style="font-size:0.75rem;text-transform:uppercase;font-weight:700;color:#888;margin-bottom:0.2rem;">Danh mục</div>
                    <div style="font-weight:700;" th:text="${product.category}">Espresso</div>
                </div>
                <div>
                    <div style="font-size:0.75rem;text-transform:uppercase;font-weight:700;color:#888;margin-bottom:0.2rem;">Tình trạng</div>
                    <div style="font-weight:700;" th:text="${product.available} ? 'Còn hàng' : 'Hết hàng'">Còn hàng</div>
                </div>
            </div>
        </div>
    </div>

</main></body>
</html>
