<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::main}, ${pageTitle}, 'admin')}">
<body><main>
<div class="admin-layout">
    <aside class="admin-sidebar">
        <div style="color:var(--yellow);font-weight:800;font-size:0.75rem;text-transform:uppercase;letter-spacing:0.1em;padding:0.5rem 1rem;margin-bottom:0.5rem;">Menu</div>
        <a th:href="@{/admin}">          &#128202; Bảng điều khiển</a>
        <a th:href="@{/admin/products}" class="active">&#9749; Sản phẩm</a>
        <a th:href="@{/admin/orders}">   &#128230; Đơn hàng</a>
        <a th:href="@{/}">             &#8592; Cửa hàng</a>
    </aside>
    <div class="admin-content">
        <div style="display:flex;align-items:center;gap:1rem;margin-bottom:1.5rem;flex-wrap:wrap;">
            <a th:href="@{/admin/products}" class="btn btn--outline" style="padding:0.4rem 0.8rem;font-size:0.85rem;">&larr; Quay lại</a>
            <h1 th:text="${pageTitle}">Form sản phẩm</h1>
        </div>

        <div class="form-card" style="max-width:700px;">
            <form th:action="${formAction}" method="post" th:object="${product}" novalidate>
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                <div class="form-group">
                    <label for="name">Tên sản phẩm *</label>
                    <input type="text" id="name" th:field="*{name}" placeholder="VD: Espresso Thuần Túy"/>
                    <div class="form-error" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
                </div>

                <div class="form-group">
                    <label for="description">Mô tả</label>
                    <textarea id="description" th:field="*{description}" rows="4"
                              placeholder="Mô tả hương vị, nguồn gốc và điều đặc biệt của sản phẩm..."></textarea>
                </div>

                <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;">
                    <div class="form-group">
                        <label for="price">Giá (VNĐ) *</label>
                        <input type="number" id="price" th:field="*{price}" step="1000" min="1000" placeholder="35000"/>
                        <div class="form-error" th:if="${#fields.hasErrors('price')}" th:errors="*{price}"></div>
                    </div>
                    <div class="form-group">
                        <label for="category">Danh mục *</label>
                        <select id="category" th:field="*{category}">
                            <option value="">— Chọn danh mục —</option>
                            <option th:each="cat : ${categories}" th:value="${cat}" th:text="${cat}">Danh mục</option>
                        </select>
                        <div class="form-error" th:if="${#fields.hasErrors('category')}" th:errors="*{category}"></div>
                    </div>
                </div>

                <div class="form-group">
                    <label for="imageUrl">Link ảnh <span style="color:#888;font-weight:400;">(tùy chọn — để trống sẽ dùng icon mặc định)</span></label>
                    <input type="url" id="imageUrl" th:field="*{imageUrl}" placeholder="https://example.com/anh.jpg"/>
                </div>

                <div style="display:flex;gap:2rem;padding:1rem;background:var(--cream);border:2px solid var(--black);margin-bottom:1.5rem;">
                    <label class="form-check">
                        <input type="checkbox" th:field="*{available}"/>
                        <span style="font-weight:700;">Đang bán</span>
                    </label>
                    <label class="form-check">
                        <input type="checkbox" th:field="*{featured}"/>
                        <span style="font-weight:700;">&#11088; Hiển thị trên trang chủ</span>
                    </label>
                </div>

                <div style="display:flex;gap:1rem;flex-wrap:wrap;">
                    <button type="submit" class="btn btn--primary btn--lg">Lưu sản phẩm</button>
                    <a th:href="@{/admin/products}" class="btn btn--outline btn--lg">Huỷ</a>
                </div>
            </form>
        </div>
    </div>
</div>
</main></body>
</html>
