<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::main}, 'Đăng nhập', '')}">
<body><main>

    <div class="form-wrap" style="padding-top:4rem;padding-bottom:4rem;">
        <div style="text-align:center;margin-bottom:2rem;">
            <img th:src="@{/images/logo-transparent.png}" alt="LENGKENG" style="height:80px;margin:0 auto 0.5rem;display:block;"/>
            <div style="font-size:1.8rem;font-weight:800;letter-spacing:-0.03em;">
                LENG<span style="color:var(--red);">KENG</span>
            </div>
        </div>

        <div class="form-card">
            <h1 class="form-title">Chào mừng trở lại</h1>
            <p class="form-subtitle">Đăng nhập để tiếp tục trải nghiệm.</p>

            <div th:if="${errorMsg}"   class="flash flash--error"   style="margin:0 0 1.2rem;" th:text="${errorMsg}"></div>
            <div th:if="${successMsg}" class="flash flash--success" style="margin:0 0 1.2rem;" th:text="${successMsg}"></div>

            <form th:action="@{/login}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <div class="form-group">
                    <label for="username">Địa chỉ Email</label>
                    <input type="email" id="username" name="username" placeholder="ban@email.com" autocomplete="email" required/>
                </div>
                <div class="form-group">
                    <label for="password">Mật khẩu</label>
                    <input type="password" id="password" name="password" placeholder="••••••••" autocomplete="current-password" required/>
                </div>
                <button type="submit" class="btn btn--primary btn--lg w-full" style="justify-content:center;margin-top:0.5rem;">
                    Đăng nhập &rarr;
                </button>
            </form>

            <div style="text-align:center;margin-top:1.5rem;padding-top:1.5rem;
                        border-top:2px solid var(--black);font-weight:600;font-size:0.9rem;">
                Chưa có tài khoản?
                <a th:href="@{/register}" style="color:var(--red);font-weight:800;text-decoration:underline;">Đăng ký ngay</a>
            </div>
        </div>

        <div style="text-align:center;margin-top:1.5rem;">
            <span class="sticker sticker--yellow">Không cần tài khoản để đặt hàng &#10003;</span>
        </div>
    </div>

</main></body>
</html>
