<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::main}, 'Giỏ hàng', '')}">
<body><main>

    <div class="page-header">
        <h1>Giỏ Hàng</h1>
        <p th:if="${!cartItems.isEmpty()}"
           th:text="${#lists.size(cartItems)} + ' sản phẩm sẵn sàng thanh toán'">0 sản phẩm</p>
    </div>

    <div th:if="${cartItems.isEmpty()}" class="empty-state" style="margin:4rem auto;max-width:560px;">
        <div class="empty-state__icon">
            <img th:src="@{/images/logo-transparent.png}" alt="LENGKENG" style="height:100px;width:auto;"/>
        </div>
        <h2>Giỏ hàng của bạn trống</h2>
        <p>Bạn chưa thêm gì cả. Khám phá thực đơn và tìm ly cà phê yêu thích nhé.</p>
        <a th:href="@{/products}" class="btn btn--primary btn--lg mt-2">Xem thực đơn</a>
    </div>

    <div th:unless="${cartItems.isEmpty()}" class="cart-layout">
        <div>
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.2rem;">
                <h2 style="font-size:1.3rem;">Sản phẩm</h2>
                <form th:action="@{/cart/clear}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <button type="submit" class="btn btn--outline"
                            style="font-size:0.8rem;padding:0.4rem 0.8rem;"
                            data-confirm="Xoá toàn bộ giỏ hàng?">Xoá giỏ hàng</button>
                </form>
            </div>

            <div th:each="item : ${cartItems}" class="cart-item">
                <div>
                    <img th:if="${item.imageUrl != null}"
                         th:src="@{${item.imageUrl}}" th:alt="${item.productName}" class="cart-item__img"/>
                    <img th:unless="${item.imageUrl != null}"
                         th:src="@{/images/logo-transparent.png}"
                         th:alt="${item.productName}"
                         class="cart-item__img"
                         style="object-fit:contain;padding:4px;background:var(--cream);"/>
                </div>
                <div>
                    <div class="cart-item__name" th:text="${item.productName}">Cà phê</div>
                    <div class="cart-item__price"
                         th:text="${#numbers.formatDecimal(item.unitPrice, 1, 'POINT', 0, 'COMMA')} + '₫/ly'">35.000₫/ly</div>
                </div>
                <form th:action="@{/cart/update}" method="post" style="display:flex;align-items:center;gap:0.4rem;">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <input type="hidden" name="productId" th:value="${item.productId}"/>
                    <div class="qty-control" style="box-shadow:none;">
                        <button type="button" data-action="dec">&#8722;</button>
                        <input type="number" name="quantity" th:value="${item.quantity}" min="1" max="20"/>
                        <button type="button" data-action="inc">&#43;</button>
                    </div>
                    <button type="submit" class="btn btn--outline" style="padding:0.4rem 0.7rem;font-size:0.8rem;">Cập nhật</button>
                </form>
                <div style="display:flex;flex-direction:column;align-items:flex-end;gap:0.5rem;">
                    <div class="cart-item__subtotal"
                         th:text="${#numbers.formatDecimal(item.subtotal, 1, 'POINT', 0, 'COMMA')} + '₫'">70.000₫</div>
                    <form th:action="@{/cart/remove}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <input type="hidden" name="productId" th:value="${item.productId}"/>
                        <button type="submit" class="btn btn--red" style="padding:0.3rem 0.7rem;font-size:0.8rem;">&times; Xoá</button>
                    </form>
                </div>
            </div>
        </div>

        <div class="cart-summary">
            <div class="cart-summary__title">Tóm tắt đơn hàng</div>
            <div th:each="item : ${cartItems}" class="cart-summary__row">
                <span th:text="${item.productName}">Sản phẩm</span>
                <span th:text="${#numbers.formatDecimal(item.subtotal, 1, 'POINT', 0, 'COMMA')} + '₫'">0₫</span>
            </div>
            <div class="cart-summary__row" style="color:#888;font-size:0.9rem;margin-top:0.5rem;">
                <span>Giao hàng</span><span>Tính khi thanh toán</span>
            </div>
            <div class="cart-summary__total">
                <span>Tổng cộng</span>
                <span th:text="${#numbers.formatDecimal(cartTotal, 1, 'POINT', 0, 'COMMA')} + '₫'">0₫</span>
            </div>
            <a th:href="@{/checkout}" class="btn btn--primary btn--lg w-full mt-3" style="justify-content:center;">Thanh toán &rarr;</a>
            <a th:href="@{/products}" class="btn btn--outline w-full mt-1" style="justify-content:center;">&larr; Tiếp tục mua sắm</a>
        </div>
    </div>

</main></body>
</html>
