<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::main}, 'Thanh toán', '')}">
<body><main>

    <div class="page-header">
        <h1>Thanh Toán</h1>
        <p>Gần xong rồi — điền thông tin và xác nhận đơn hàng của bạn.</p>
    </div>

    <div style="display:grid;grid-template-columns:1fr 380px;gap:2rem;
                padding:clamp(2rem,4vw,4rem);align-items:start;">
        <div>
            <form th:action="@{/checkout}" method="post" th:object="${checkoutForm}" novalidate>
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                <div class="form-card" style="margin-bottom:1.5rem;">
                    <h2 style="font-size:1.3rem;margin-bottom:1.5rem;padding-bottom:1rem;border-bottom:2px solid var(--black);">
                        &#128100; Thông tin liên hệ
                    </h2>
                    <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;">
                        <div class="form-group">
                            <label for="fullName">Họ và tên</label>
                            <input type="text" id="fullName" th:field="*{fullName}" placeholder="Nguyễn Văn A"/>
                            <div class="form-error" th:if="${#fields.hasErrors('fullName')}" th:errors="*{fullName}"></div>
                        </div>
                        <div class="form-group">
                            <label for="email">Email</label>
                            <input type="email" id="email" th:field="*{email}" placeholder="ban@email.com"/>
                            <div class="form-error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="phone">Số điện thoại</label>
                        <input type="tel" id="phone" th:field="*{phone}" placeholder="0912 345 678"/>
                        <div class="form-error" th:if="${#fields.hasErrors('phone')}" th:errors="*{phone}"></div>
                    </div>
                </div>

                <div class="form-card" style="margin-bottom:1.5rem;">
                    <h2 style="font-size:1.3rem;margin-bottom:1.5rem;padding-bottom:1rem;border-bottom:2px solid var(--black);">
                        &#128666; Địa chỉ giao hàng
                    </h2>
                    <div class="form-group">
                        <label for="address">Địa chỉ đầy đủ</label>
                        <textarea id="address" th:field="*{address}" rows="3"
                                  placeholder="Số nhà, tên đường, phường/xã, quận/huyện, tỉnh/thành phố"></textarea>
                        <div class="form-error" th:if="${#fields.hasErrors('address')}" th:errors="*{address}"></div>
                    </div>
                    <div class="form-group">
                        <label for="notes">Ghi chú đơn hàng <span style="color:#888;font-weight:400;">(tùy chọn)</span></label>
                        <textarea id="notes" th:field="*{notes}" rows="2"
                                  placeholder="Thêm shot espresso, không đường, để ở cổng..."></textarea>
                    </div>
                </div>

                <div style="background:var(--yellow);border:4px solid var(--black);padding:1rem 1.2rem;
                            box-shadow:4px 4px 0 var(--black);margin-bottom:1.5rem;
                            display:flex;gap:0.8rem;align-items:center;">
                    <span style="font-size:1.5rem;">&#128274;</span>
                    <div>
                        <strong style="display:block;margin-bottom:0.2rem;">Thanh toán khi nhận hàng (COD)</strong>
                        <span style="font-size:0.85rem;color:#555;">Trả tiền khi nhận hàng. Không cần thẻ ngân hàng.</span>
                    </div>
                </div>

                <button type="submit" class="btn btn--primary btn--lg w-full" style="justify-content:center;font-size:1.1rem;">
                    Đặt hàng ngay &rarr;
                </button>
            </form>
        </div>

        <div class="cart-summary" style="top:90px;position:sticky;">
            <div class="cart-summary__title">&#9749; Đơn hàng của bạn</div>
            <div th:each="item : ${cartItems}"
                 style="display:flex;justify-content:space-between;align-items:center;padding:0.6rem 0;border-bottom:1px solid #eee;">
                <div>
                    <div style="font-weight:700;font-size:0.9rem;" th:text="${item.productName}">Sản phẩm</div>
                    <div style="font-size:0.8rem;color:#888;" th:text="'x' + ${item.quantity}">x1</div>
                </div>
                <div style="font-weight:700;"
                     th:text="${#numbers.formatDecimal(item.subtotal, 1, 'POINT', 0, 'COMMA')} + '₫'">0₫</div>
            </div>
            <div class="cart-summary__row" style="margin-top:0.8rem;">
                <span style="color:#888;">Giao hàng</span><span style="color:#888;">Miễn phí</span>
            </div>
            <div class="cart-summary__total">
                <span>Tổng cộng</span>
                <span th:text="${#numbers.formatDecimal(cartTotal, 1, 'POINT', 0, 'COMMA')} + '₫'">0₫</span>
            </div>
            <a th:href="@{/cart}" class="btn btn--outline w-full mt-2" style="justify-content:center;font-size:0.85rem;">&larr; Sửa giỏ hàng</a>
        </div>
    </div>

</main></body>
</html>
